<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-ab" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="bg-ab" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <linearGradient id="grid-ab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#7000FF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0.05" />
    </linearGradient>
    <pattern id="grid-p" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-ab)" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg-ab)" rx="12" />
  <rect width="1200" height="480" fill="url(#grid-p)" rx="12" />

  <!-- Circuit Lines -->
  <g stroke="#00F2FF" stroke-opacity="0.1" stroke-width="1" fill="none">
    <path d="M0 60 H80 L110 90 H200" />
    <path d="M1200 60 H1120 L1090 90 H1000" />
    <path d="M0 350 H60 L90 380 V480" />
    <path d="M1200 350 H1140 L1110 380 V480" />
    <path d="M200 0 V30 L230 60" />
    <path d="M1000 480 V450 L970 420" />
    <path d="M400 0 V40 L370 70 H300" stroke-opacity="0.05" />
    <path d="M800 0 V40 L830 70 H900" stroke-opacity="0.05" />
    <path d="M0 200 H50 L80 170" stroke-opacity="0.05" />
    <path d="M1200 200 H1150 L1120 230" stroke-opacity="0.05" />
    <path d="M600 0 V50 L570 80" stroke-opacity="0.03" />
    <path d="M600 480 V430 L630 400" stroke-opacity="0.03" />
  </g>

  <!-- Animated Flow Drips -->
  <g fill="none">
    <path d="M0 60 H80 L110 90 H200" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="60, 300" stroke-opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="360" to="0" dur="12s" repeatCount="indefinite" />
    </path>
    <path d="M1200 60 H1120 L1090 90 H1000" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="60, 300" stroke-opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="-360" to="0" dur="14s" repeatCount="indefinite" />
    </path>
    <path d="M200 0 V30 L230 60" stroke="#00ffff" stroke-width="1" stroke-dasharray="40, 200" stroke-opacity="0.2">
      <animate attributeName="stroke-dashoffset" from="240" to="0" dur="10s" repeatCount="indefinite" />
    </path>
    <path d="M1000 480 V450 L970 420" stroke="#00ffff" stroke-width="1" stroke-dasharray="40, 200" stroke-opacity="0.2">
      <animate attributeName="stroke-dashoffset" from="-240" to="0" dur="12s" repeatCount="indefinite" />
    </path>
    <path d="M0 200 H50 L80 170" stroke="#00ffff" stroke-width="1" stroke-dasharray="10, 100" opacity="0.4">
      <animate attributeName="stroke-dashoffset" from="130" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M1200 200 H1150 L1120 230" stroke="#00ffff" stroke-width="1" stroke-dasharray="10, 100" opacity="0.4">
      <animate attributeName="stroke-dashoffset" from="-130" to="0" dur="4.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pulsing Nodes -->
  <g fill="#00ffff" fill-opacity="0.6">
    <circle cx="110" cy="90" r="2">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1090" cy="90" r="2">
      <animate attributeName="r" values="2;4;2" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="80" cy="170" r="1.5" />
    <circle cx="1120" cy="230" r="1.5" />
  </g>


  <!-- Title Bar Background -->
  <rect x="0" y="0" width="1200" height="50" fill="#0d0d1a" fill-opacity="0.8" rx="12" />
  <rect x="0" y="40" width="1200" height="12" fill="#0d0d1a" fill-opacity="0.8" />
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#00F2FF" stroke-opacity="0.15" stroke-width="1" />

  <!-- Mac Buttons -->
  <circle cx="35" cy="25" r="8" fill="#ff5f56" />
  <circle cx="65" cy="25" r="8" fill="#ffbd2e" />
  <circle cx="95" cy="25" r="8" fill="#27c93f" />

  <!-- Terminal Title -->
  <text x="600" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#8b949e" letter-spacing="1">
    bharath@system ~ /about-me
  </text>

  <!-- HUD Corner Brackets -->
  <g stroke="#00F2FF" stroke-width="1.5" fill="none" stroke-opacity="0.3">
    <path d="M20 65 H50 M20 65 V95" />
    <path d="M1180 65 H1150 M1180 65 V95" />
    <path d="M20 465 H50 M20 465 V435" />
    <path d="M1180 465 H1150 M1180 465 V435" />
  </g>

  <!-- Field Labels and Values (Refined Alignment) -->
  <g font-family="'Courier New', Courier, monospace">

    <!-- NAME -->
    <text x="80" y="110" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">NAME</text>
    <text x="310" y="110" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="110" fill="#c9d1d9" font-size="22" font-weight="600">Bharath Kumar A</text>

    <!-- ROLE -->
    <text x="80" y="165" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">ROLE</text>
    <text x="310" y="165" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="165" fill="#c9d1d9" font-size="22" font-weight="600">ECE Undergraduate | IoT Developer | Full Stack Web Dev</text>

    <!-- INSTITUTION -->
    <text x="80" y="220" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">INSTITUTION</text>
    <text x="310" y="220" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="220" fill="#c9d1d9" font-size="22" font-weight="600">Vidya Vardhaka College of Engineering</text>

    <!-- STATUS -->
    <text x="80" y="275" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">STATUS</text>
    <text x="310" y="275" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="275" fill="#27c93f" font-size="22" font-weight="bold">[ ONLINE ]</text>
    <text x="495" y="275" fill="#c9d1d9" font-size="20" font-weight="600">– Continuously learning and innovating</text>
    <!-- Cursor -->
    <rect x="478" y="255" width="2" height="25" fill="#27c93f">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- INTERESTS -->
    <text x="80" y="330" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">INTERESTS</text>
    <text x="310" y="330" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="330" fill="#c9d1d9" font-size="22" font-weight="600">IoT · Embedded Systems · Gen AI · Next.js · UI/UX · Robotics</text>

    <!-- HARDWARE -->
    <text x="80" y="385" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">HARDWARE</text>
    <text x="310" y="385" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="385" fill="#c9d1d9" font-size="22" font-weight="600">Arduino Uno · ESP32 · Raspberry Pi Pico</text>

    <!-- MISSION -->
    <text x="80" y="440" fill="#00F2FF" font-size="26" font-weight="bold" letter-spacing="1">MISSION</text>
    <text x="310" y="440" fill="#8b949e" font-size="26" font-weight="bold">:</text>
    <text x="340" y="440" fill="#c9d1d9" font-size="22" font-weight="600">Merging hardware &amp; software to solve real-world problems</text>
  </g>

  <!-- Bottom Border Glow -->
  <rect x="0" y="478" width="1200" height="2" fill="#00F2FF" fill-opacity="0.15" rx="1">
    <animate attributeName="fill-opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite" />
  </rect>

</svg>
