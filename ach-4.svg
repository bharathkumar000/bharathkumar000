<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-4">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-4)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />

  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M550 120 H510 L490 100" />
    <path d="M0 30 H40 L60 50" />
  </g>
  <path d="M550 120 H510 L490 100" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="10, 80" fill="none">
    <animate attributeName="stroke-dashoffset" from="-90" to="0" dur="2.5s" repeatCount="indefinite" />
  </path>

  <text x="25" y="45" font-family="sans-serif" font-size="13">🛡️</text>
  <text x="50" y="45" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#00F2FF" filter="url(#glow-4)">Semi-Finalist — Hack the Hackers</text>
  
  <text x="25" y="75" font-family="monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="50" y="75" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">tls-auditor</text>
  <text x="160" y="75" font-family="monospace" font-size="14" fill="#c9d1d9" font-weight="bold">· GSSSIETW MYSURU</text>
  
  <text x="25" y="110" font-family="sans-serif" font-size="14" fill="#8b949e">Automated server encryption hardening tool</text>
  <text x="25" y="130" font-family="sans-serif" font-size="14" fill="#8b949e">identifying weak cipher suites.</text>

  <rect x="25" y="155" width="70" height="22" rx="4" fill="#00F2FF" />
  <text x="60" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#000">TLS/SSL</text>
  <rect x="105" y="155" width="60" height="22" rx="4" fill="#24292E" />
  <text x="135" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">HTTPS</text>
  <rect x="175" y="155" width="115" height="22" rx="4" fill="#000" stroke="#333" />
  <text x="232" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">CYBERSECURITY</text>
</svg>
