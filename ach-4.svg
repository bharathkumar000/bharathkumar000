<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-nexus" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-nexus" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-nexus">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-nexus)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />

  <!-- Animated Data Flows -->
  <g stroke="#00F2FF" stroke-opacity="0.1" stroke-width="1" fill="none">
    <path d="M0 60 H50 L70 80 H200" />
    <path d="M550 140 H500 L480 120 H350" />
    <path d="M400 0 V30 L430 60 H550" />
  </g>
  
  <g fill="none">
    <path d="M0 60 H50 L70 80 H200" stroke="#00ffff" stroke-width="2" stroke-dasharray="15, 120">
      <animate attributeName="stroke-dashoffset" from="135" to="0" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M550 140 H500 L480 120 H350" stroke="#39FF14" stroke-width="1.5" stroke-dasharray="20, 150" stroke-opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="-170" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M400 0 V30 L430 60 H550" stroke="#00ffff" stroke-width="1" stroke-dasharray="10, 80" opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="90" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Scanning Beam -->
    <rect x="0" y="0" width="2" height="200" fill="#00F2FF" fill-opacity="0.1">
      <animate attributeName="x" from="0" to="550" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Content -->
  <text x="25" y="54" font-family="sans-serif" font-size="22">🧬</text>
  <text x="65" y="54" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#00F2FF" filter="url(#glow-nexus)">Nexus Twin — Digital AI Core</text>
  
  <text x="25" y="92" font-family="monospace" font-size="16" fill="#8b949e">📂</text>
  <text x="55" y="90" font-family="'Courier New', monospace" font-size="17" fill="#00BFFF" text-decoration="underline" font-weight="bold">nexus-twin-v2</text>
  <text x="210" y="90" font-family="monospace" font-size="16" fill="#c9d1d9" font-weight="bold">· ARCH_SYNC_ACTIVE</text>
  
  <text x="25" y="125" font-family="sans-serif" font-size="15" fill="#8b949e">Real-time digital twin synchronization with neural</text>
  <text x="25" y="145" font-family="sans-serif" font-size="15" fill="#8b949e">network optimization for predictive diagnostics.</text>

  <g transform="translate(25, 165)">
    <rect width="90" height="22" rx="4" fill="#339933" />
    <text x="45" y="15" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">NEURAL SYNC</text>
    
    <rect x="100" width="70" height="22" rx="4" fill="#007ACC" />
    <text x="135" y="15" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">TYPESCRIPT</text>
    
    <rect x="180" width="80" height="22" rx="4" fill="#000" stroke="#333" />
    <text x="220" y="15" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">AUTONOMOUS</text>
  </g>
  
  <!-- Pulsing Hub Node -->
  <circle cx="510" cy="170" r="4" fill="#39FF14" fill-opacity="0.6">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
