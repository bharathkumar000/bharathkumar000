<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-2">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-2)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />

  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M550 40 H510 L490 60 H430" />
    <path d="M0 160 H40 L60 140 H150" />
    <path x1="200" y1="0" x2="230" y2="30" stroke-opacity="0.05" />
  </g>
  
  <g fill="none">
    <path d="M550 40 H510 L490 60 H430" stroke="#00ffff" stroke-width="2" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="-115" to="0" dur="3.5s" repeatCount="indefinite" />
    </path>
    <path d="M0 160 H40 L60 140 H150" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="115" to="0" dur="4.5s" repeatCount="indefinite" />
    </path>
  </g>

  <text x="25" y="45" font-family="sans-serif" font-size="13">🥉</text>
  <text x="50" y="45" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#00F2FF" filter="url(#glow-2)">3rd PLACE — State Level Hackathon</text>
  
  <text x="25" y="75" font-family="monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="50" y="75" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">RESQLINK</text>
  <text x="135" y="75" font-family="monospace" font-size="14" fill="#c9d1d9" font-weight="bold">· PESCE MANDYA</text>
  
  <text x="25" y="110" font-family="sans-serif" font-size="14" fill="#8b949e">IoT-based solution for real-time natural disaster</text>
  <text x="25" y="130" font-family="sans-serif" font-size="14" fill="#8b949e">monitoring and automated alerts.</text>

  <rect x="25" y="155" width="75" height="22" rx="4" fill="#FFCA28" />
  <text x="62" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#000">FIREBASE</text>
  <rect x="110" y="155" width="100" height="22" rx="4" fill="#4285F4" />
  <text x="160" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">GOOGLE MAPS</text>
  <rect x="220" y="155" width="70" height="22" rx="4" fill="#339933" />
  <text x="255" y="170" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">NODE.JS</text>
</svg>
