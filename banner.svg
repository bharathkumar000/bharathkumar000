<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#7000FF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0.05" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-grad)" stroke-width="0.5" />
    </pattern>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#140024" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-glow)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Circuit Lines -->
  <g stroke="#00F2FF" stroke-opacity="0.2" stroke-width="1" fill="none">
    <path d="M0 100 H100 L150 150 H300 L350 100 H500" />
    <path d="M1200 300 H1100 L1050 250 H900 L850 300 H700" />
    <circle cx="150" cy="150" r="3" fill="#00F2FF" fill-opacity="0.4" />
    <circle cx="1050" cy="250" r="3" fill="#00F2FF" fill-opacity="0.4" />
    <path d="M600 0 V50 L550 100 H400" />
    <path d="M600 400 V350 L650 300 H800" />
  </g>

  <!-- Title Section -->
  <g filter="url(#glow)">
    <text x="50%" y="45%" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF">
      BHARATH KUMAR
    </text>
    <text x="50%" y="45.5%" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="80" fill="none" stroke="#00F2FF" stroke-width="1" stroke-opacity="0.5">
      BHARATH KUMAR
    </text>
  </g>

  <!-- Roles Section -->
  <g transform="translate(0, 20)">
    <rect x="350" y="220" width="500" height="40" rx="4" fill="#00F2FF" fill-opacity="0.05" stroke="#00F2FF" stroke-opacity="0.2" />
    <text x="600" y="246" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="16" fill="#00F2FF" letter-spacing="2">
      SYSTEM.DEVELOPER // [IoT.EMBEDDED.FULLSTACK]
    </text>
    
    <!-- Moving "Scanner" line -->
    <rect x="350" y="220" width="2" height="40" fill="#00F2FF">
      <animate attributeName="x" from="350" to="848" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- HUD Brackets -->
  <g stroke="#00F2FF" stroke-width="2" fill="none">
    <!-- Top Left -->
    <path d="M40 40 H100 M40 40 V100" stroke-opacity="0.6" />
    <!-- Top Right -->
    <path d="M1160 40 H1100 M1160 40 V100" stroke-opacity="0.6" />
    <!-- Bottom Left -->
    <path d="M40 360 H100 M40 360 V300" stroke-opacity="0.6" />
    <!-- Bottom Right -->
    <path d="M1160 360 H1100 M1160 360 V300" stroke-opacity="0.6" />
  </g>

  <!-- Data Stream Elements -->
  <g font-family="monospace" font-size="10" fill="#00F2FF" fill-opacity="0.3">
    <text x="1110" y="340">LAT: 12.9716</text>
    <text x="1110" y="355">LNG: 77.5946</text>
    <text x="50" y="340">STATUS: ACTIVE</text>
    <text x="50" y="355">MEM: 1024GB/4096GB</text>
  </g>

</svg>
