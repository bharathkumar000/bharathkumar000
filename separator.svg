<svg width="1200" height="20" viewBox="0 0 1200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="0" />
      <stop offset="50%" stop-color="#00F2FF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <path d="M0 10 H1200" stroke="#00F2FF" stroke-width="1" stroke-opacity="0.2" />
  <rect x="0" y="9" width="400" height="2" fill="url(#sep-grad)">
    <animate attributeName="x" from="-400" to="1200" dur="8s" repeatCount="indefinite" />
  </rect>
  <rect x="0" y="8" width="100" height="4" fill="#00F2FF" fill-opacity="0.6">
    <animate attributeName="x" from="-100" to="1200" dur="6s" repeatCount="indefinite" />
    <animate attributeName="width" values="100;200;100" dur="6s" repeatCount="indefinite" />
  </rect>
  <rect x="0" y="8" width="50" height="4" fill="#7000FF" fill-opacity="0.6">
    <animate attributeName="x" from="-50" to="1200" dur="5s" begin="0.7s" repeatCount="indefinite" />
  </rect>
</svg>
