<svg width="1200" height="20" viewBox="0 0 1200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 10 H1200" stroke="#00F2FF" stroke-width="2" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite" />
  </path>
  <rect x="0" y="8" width="100" height="4" fill="#00F2FF">
    <animate attributeName="x" from="-100" to="1200" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <rect x="0" y="8" width="50" height="4" fill="#7000FF">
    <animate attributeName="x" from="-50" to="1200" dur="2s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </rect>
</svg>
