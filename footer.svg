<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#140024" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <pattern id="footer-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
  </defs>

  <rect width="1200" height="120" fill="url(#footer-grad)" />
  <rect width="1200" height="120" fill="url(#footer-grid)" />

  <!-- Top Border Glow -->
  <rect width="1200" height="2" fill="#00F2FF" fill-opacity="0.3" />
  
  <!-- Circuit Lines Background with Flowing Data -->
  <g stroke="#00F2FF" stroke-opacity="0.12" stroke-width="1" fill="none">
    <path id="flow1" d="M0 40 H120 L160 80 H300 L340 40 H500" />
    <path id="flow2" d="M1200 80 H1080 L1040 40 H900 L860 80 H720" />
    <path id="flow3" d="M600 0 V30 L570 60 H450" />
    <path id="flow4" d="M600 120 V90 L630 60 H750" />
    
    <!-- Animated Flow Drip -->
    <path d="M0 40 H120 L160 80 H300 L340 40 H500" stroke="#00F2FF" stroke-width="2" stroke-dasharray="20, 200">
      <animate attributeName="stroke-dashoffset" from="220" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M1200 80 H1080 L1040 40 H900 L860 80 H720" stroke="#00F2FF" stroke-width="2" stroke-dasharray="20, 200">
      <animate attributeName="stroke-dashoffset" from="-220" to="0" dur="5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pulsing Nodes -->
  <g fill="#00F2FF">
    <circle cx="160" cy="80" r="2">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="1040" cy="40" r="2">
      <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="570" cy="60" r="2">
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Cyberpunk Geometric Accents -->
  <path d="M0 20 L200 20 L240 60 H400 L440 20 H760 L800 60 H960 L1000 20 H1200" stroke="#00F2FF" stroke-opacity="0.15" stroke-width="1" fill="none" />
  
  <rect x="0" y="0" width="100%" height="120" fill="none" stroke="#7000FF" stroke-opacity="0.1" stroke-width="2" />
  
  <!-- Scanning Light with Blur -->
  <rect x="0" y="0" width="200" height="2" fill="#00F2FF">
    <animate attributeName="x" from="-200" to="1200" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" />
  </rect>

</svg>
