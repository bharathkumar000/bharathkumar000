<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#140024" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <pattern id="footer-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
  </defs>

  <!-- High Intensity Background Rects -->
  <rect width="1200" height="120" fill="url(#footer-grad)" />
  <rect width="1200" height="120" fill="url(#footer-grid)">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Glitch Pixels Layer -->
  <g fill="#00F2FF" fill-opacity="0.3">
    <rect x="100" y="30" width="4" height="4">
      <animate attributeName="opacity" values="0;1;0;0;1;0" dur="2s" repeatCount="indefinite" />
    </rect>
    <rect x="400" y="80" width="2" height="10">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="800" y="20" width="6" height="2">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
    </rect>
    <rect x="1100" y="90" width="4" height="4">
      <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Top Border Glow -->
  <rect width="1200" height="2" fill="#00F2FF" fill-opacity="0.3">
    <animate attributeName="fill-opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Flow Lines -->
  <g stroke="#00F2FF" stroke-opacity="0.12" stroke-width="1" fill="none">
    <path d="M0 40 H120 L160 80 H300 L340 40 H500" />
    <path d="M1200 80 H1080 L1040 40 H900 L860 80 H720" />
    <path d="M600 0 V30 L570 60 H450" />
    <path d="M600 120 V90 L630 60 H750" />
    
    <!-- Flow Drips -->
    <path d="M0 40 H120 L160 80 H300 L340 40 H500" stroke="#00F2FF" stroke-width="2" stroke-dasharray="20, 200">
      <animate attributeName="stroke-dashoffset" from="220" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M1200 80 H1080 L1040 40 H900 L860 80 H720" stroke="#00F2FF" stroke-width="2" stroke-dasharray="20, 200">
      <animate attributeName="stroke-dashoffset" from="-220" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M600 0 V30 L570 60 H450" stroke="#00F2FF" stroke-width="1.5" stroke-dasharray="10, 100">
      <animate attributeName="stroke-dashoffset" from="110" to="0" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pulsing Nodes -->
  <g fill="#00F2FF">
    <circle cx="160" cy="80" r="2">
      <animate attributeName="r" values="2;5;2" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="1040" cy="40" r="2">
      <animate attributeName="r" values="2;5;2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="570" cy="60" r="2">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- HUD Style Text / Decorations -->
  <g fill="#00F2FF" font-family="monospace" font-size="10" font-weight="bold" opacity="0.4">
    <text x="20" y="105">[ SYSTEM SECURE ]</text>
    <text x="1100" y="105">TRC: 0xFF2A</text>
    <rect x="20" y="110" width="80" height="2" fill-opacity="0.2" />
    <rect x="20" y="110" width="40" height="2">
      <animate attributeName="width" values="0;80;20;60;0" dur="5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Fast Scanning Vertical HUD Bar -->
  <rect x="0" y="0" width="2" height="120" fill="#00F2FF" fill-opacity="0.2">
    <animate attributeName="x" from="0" to="1200" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- Horizontal Scanning Light -->
  <rect x="0" y="0" width="300" height="3" fill="#00F2FF">
    <animate attributeName="x" from="-300" to="1200" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
