<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .repo-title { font: bold 22px 'Courier New', monospace; fill: #00F2FF; filter: url(#glow); }
    .repo-desc { font: 14px 'Segoe UI', sans-serif; fill: #8b949e; }
    .repo-stat { font: 13px 'Courier New', monospace; fill: #c9d1d9; }
    .repo-link { font: 14px 'Courier New', monospace; fill: #00BFFF; text-decoration: underline; }
  </style>
  <defs>
    <radialGradient id="bg-repo" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-repo" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="550" height="200" fill="url(#bg-repo)" rx="10" stroke="#00F2FF" stroke-opacity="0.15" />
  <rect width="550" height="200" fill="url(#grid-repo)" rx="10" />

  <!-- Scanning Beam (Double Activity) -->
  <line x1="0" y1="0" x2="550" y2="0" stroke="#00F2FF" stroke-opacity="0.1" stroke-width="2">
    <animate attributeName="y1" from="0" to="200" dur="3s" repeatCount="indefinite" />
    <animate attributeName="y2" from="0" to="200" dur="3s" repeatCount="indefinite" />
  </line>
  <line x1="0" y1="0" x2="550" y2="0" stroke="#00F2FF" stroke-opacity="0.05" stroke-width="1">
    <animate attributeName="y1" from="200" to="0" dur="5s" repeatCount="indefinite" />
    <animate attributeName="y2" from="200" to="0" dur="5s" repeatCount="indefinite" />
  </line>

  <!-- COMPLEX CIRCUIT FLOWS (X5 Animation) -->
  <g stroke="#00F2FF" stroke-opacity="0.06" stroke-width="1" fill="none">
    <path d="M0 40 H60 L80 60 H200" />
    <path d="M550 160 H490 L470 140 H300" />
    <path d="M400 0 V40 L430 70 H550" />
    <path d="M150 200 V160 L120 130 H0" />
    <path d="M300 0 V30 L280 50 H240" />
  </g>
  
  <g fill="none" stroke-width="1.5">
    <path d="M0 40 H60 L80 60 H200" stroke="#00ffff" stroke-dasharray="15, 80">
      <animate attributeName="stroke-dashoffset" from="95" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M550 160 H490 L470 140 H300" stroke="#39FF14" stroke-dasharray="20, 100" stroke-opacity="0.4">
      <animate attributeName="stroke-dashoffset" from="-120" to="0" dur="4.5s" repeatCount="indefinite" />
    </path>
    <path d="M400 0 V40 L430 70 H550" stroke="#00ffff" stroke-dasharray="12, 60">
      <animate attributeName="stroke-dashoffset" from="72" to="0" dur="1.8s" repeatCount="indefinite" />
    </path>
    <path d="M150 200 V160 L120 130 H0" stroke="#00ffff" stroke-dasharray="30, 150" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="-180" to="0" dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M300 0 V30 L280 50 H240" stroke="#00ffff" stroke-dasharray="8, 40">
      <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pulsing Nodes -->
  <circle cx="80" cy="60" r="2" fill="#00ffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="470" cy="140" r="1.5" fill="#39FF14">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- HUD Corner Brackets -->
  <g stroke="#00F2FF" stroke-width="1.5" stroke-opacity="0.4">
    <path d="M 10 30 V 10 H 30" />
    <path d="M 520 190 H 540 V 170" />
    <path d="M 540 30 V 10 H 520" />
    <path d="M 10 170 V 190 H 30" />
  </g>

  <!-- Content Group -->
  <text x="30" y="45" font-size="20">🚀</text>
  <text x="65" y="46" class="repo-title">mysurumarga</text>
  
  <text x="30" y="82" font-size="14">📂</text>
  <text x="55" y="82" class="repo-link">Source Repository Analysis</text>

  <text x="30" y="120" class="repo-desc">No description provided.</text>

  <!-- Footer Stats -->
  <g transform="translate(30, 165)">
    <circle cx="5" cy="0" r="5" fill="#F1E05A" id="lang-color" />
    <text x="20" y="5" class="repo-stat">JavaScript</text>
    
    <g transform="translate(140, 0)">
       <text y="5" class="repo-stat" fill="#00F2FF" style="filter:url(#glow)">★ 0</text>
    </g>
    
    <g transform="translate(210, 0)">
       <text y="5" class="repo-stat" fill="#00F2FF" style="filter:url(#glow)">⑂ 0</text>
    </g>
  </g>
</svg>
