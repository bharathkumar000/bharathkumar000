name: Update GitHub Streak Stats

on:
  schedule:
    # Runs every 6 hours at :05 past the hour (avoids GitHub's busy :00 slot)
    - cron: '5 */6 * * *'
  push:
    branches:
      - main
      - v1
  workflow_dispatch: # Manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Update Script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stats.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Stage files carefully (avoiding missing pathspec aborting the add)
          git add streak-stats.svg repo-card-*.svg || true
          if [ -f error-log.txt ]; then
            git add error-log.txt
          fi
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update streak and repo card stats [skip ci]" && git push)
