  </text>

  <rect x="640" y="185" width="86" height="22" rx="4" fill="#FFCA28" />
  <text x="683" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#000">FIREBASE</text>

  <rect x="736" y="185" width="115" height="22" rx="4" fill="#4285F4" />
  <text x="793" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">GOOGLE MAPS</text>

  <rect x="861" y="185" width="85" height="22" rx="4" fill="#339933" />
  <text x="903" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">NODE.JS</text>

