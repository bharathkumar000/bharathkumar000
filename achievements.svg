<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-ach" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f0014" />
      <stop offset="100%" stop-color="#060606" />
    </radialGradient>
    <linearGradient id="grid-ach" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="0.04" />
      <stop offset="50%" stop-color="#7000FF" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0.04" />
    </linearGradient>
    <pattern id="grid-ach-p" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-ach)" stroke-width="0.5" />
    </pattern>
    <filter id="glow-ach" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg-ach)" rx="12" />
  <rect width="1200" height="520" fill="url(#grid-ach-p)" rx="12" />

  <!-- Circuit Lines -->
  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0 80 H60 L90 110 H180" />
    <path d="M1200 80 H1140 L1110 110 H1020" />
    <path d="M0 440 H50 L80 470 V520" />
    <path d="M1200 440 H1150 L1120 470 V520" />
  </g>

  <!-- Animated Flow -->
  <path d="M0 80 H60 L90 110 H180" stroke="#00ffff" stroke-width="2" stroke-dasharray="20, 140" fill="none">
    <animate attributeName="stroke-dashoffset" from="160" to="0" dur="3s" repeatCount="indefinite" />
  </path>
  <path d="M1200 80 H1140 L1110 110 H1020" stroke="#00ffff" stroke-width="2" stroke-dasharray="20, 140" fill="none">
    <animate attributeName="stroke-dashoffset" from="-160" to="0" dur="3.5s" repeatCount="indefinite" />
  </path>

  <!-- Pulsing Nodes -->
  <circle cx="90" cy="110" r="2" fill="#00ffff">
    <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="110" r="2" fill="#00ffff">
    <animate attributeName="r" values="2;4;2" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
  </circle>

  <!-- HUD Brackets -->
  <g stroke="#00F2FF" stroke-width="1.5" fill="none" stroke-opacity="0.25">
    <path d="M20 20 H55 M20 20 V55" />
    <path d="M1180 20 H1145 M1180 20 V55" />
    <path d="M20 500 H55 M20 500 V465" />
    <path d="M1180 500 H1145 M1180 500 V465" />
  </g>

  <!-- ======================== CARD 1: Parivartan ======================== -->
  <rect x="40" y="40" width="545" height="200" rx="8" fill="#0d0d1a" fill-opacity="0.6" stroke="#00F2FF" stroke-opacity="0.12" />

  <!-- Medal + Title -->
  <text x="65" y="78" font-family="'Segoe UI', sans-serif" font-size="13" fill="#c9d1d9">🥈</text>
  <text x="90" y="78" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00F2FF" filter="url(#glow-ach)">
    2nd PLACE — Parivartan 24H Hackathon
  </text>

  <!-- Project Link -->
  <text x="65" y="110" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="90" y="110" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">mysurumarga</text>
  <text x="210" y="110" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">·</text>
  <text x="225" y="110" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#c9d1d9">VVCE MYSURU</text>

  <!-- Description -->
  <text x="65" y="145" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
    Digital bridge for micro-enterprises featuring
  </text>
  <text x="65" y="165" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
    AI bots and decentralized models.
  </text>

  <!-- Tech Tags -->
  <rect x="65" y="185" width="68" height="22" rx="4" fill="#412991" />
  <text x="99" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">AI BOT</text>

  <rect x="143" y="185" width="100" height="22" rx="4" fill="#3C3C3D" />
  <text x="193" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">ETHEREUM</text>

  <rect x="253" y="185" width="70" height="22" rx="4" fill="#F24E1E" />
  <text x="288" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">FIGMA</text>

  <!-- ======================== CARD 2: RESQLINK ======================== -->
  <rect x="615" y="40" width="545" height="200" rx="8" fill="#0d0d1a" fill-opacity="0.6" stroke="#00F2FF" stroke-opacity="0.12" />

  <text x="640" y="78" font-family="'Segoe UI', sans-serif" font-size="13" fill="#c9d1d9">🥉</text>
  <text x="665" y="78" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00F2FF" filter="url(#glow-ach)">
