  </text>

  <rect x="65" y="415" width="72" height="22" rx="4" fill="#61DAFB" />
  <text x="101" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#000">REACT</text>

  <rect x="147" y="415" width="80" height="22" rx="4" fill="#000000" stroke="#333" stroke-width="1" />
  <text x="187" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">VERCEL</text>

  <rect x="237" y="415" width="90" height="22" rx="4" fill="#24292E" />
  <text x="282" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">PEERLIST</text>

  <!-- ======================== CARD 4: tls-auditor ======================== -->
  <rect x="615" y="270" width="545" height="200" rx="8" fill="#0d0d1a" fill-opacity="0.6" stroke="#00F2FF" stroke-opacity="0.12" />

  <text x="640" y="308" font-family="'Segoe UI', sans-serif" font-size="13" fill="#c9d1d9">🛡️</text>
  <text x="665" y="308" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00F2FF" filter="url(#glow-ach)">
    Semi-Finalist — Hack the Hackers
  </text>

  <text x="640" y="340" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="665" y="340" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">tls-auditor</text>
  <text x="790" y="340" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">·</text>
  <text x="805" y="340" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#c9d1d9">GSSSIETW MYSURU</text>

  <text x="640" y="375" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
    Automated server encryption hardening tool
  </text>
  <text x="640" y="395" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
    identifying weak cipher suites.
  </text>

  <rect x="640" y="415" width="78" height="22" rx="4" fill="#00F2FF" />
  <text x="679" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#000">TLS/SSL</text>

  <rect x="728" y="415" width="72" height="22" rx="4" fill="#24292E" />
  <text x="764" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">HTTPS</text>

  <rect x="810" y="415" width="130" height="22" rx="4" fill="#000000" stroke="#333" stroke-width="1" />
  <text x="875" y="430" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#fff">CYBERSECURITY</text>

  <!-- Scanning Bar -->
  <rect x="40" y="40" width="1120" height="1" fill="#00F2FF" fill-opacity="0.04">
    <animate attributeName="y" from="40" to="470" dur="6s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="0;0.06;0" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- Bottom Glow -->
  <rect x="0" y="518" width="1200" height="2" fill="#00F2FF" fill-opacity="0.12" rx="1">
    <animate attributeName="fill-opacity" values="0.08;0.2;0.08" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>
