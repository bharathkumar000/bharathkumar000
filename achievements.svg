  </text>

  <text x="640" y="110" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="665" y="110" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">RESQLINK</text>
  <text x="770" y="110" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">·</text>
  <text x="785" y="110" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#c9d1d9">PESCE MANDYA</text>

  <text x="640" y="145" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
