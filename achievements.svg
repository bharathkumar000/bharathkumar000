  </text>

  <text x="65" y="340" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">📂</text>
  <text x="90" y="340" font-family="'Courier New', monospace" font-size="14" fill="#58a6ff" text-decoration="underline">connect-prep</text>
  <text x="225" y="340" font-family="'Courier New', monospace" font-size="14" fill="#8b949e">·</text>
  <text x="240" y="340" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#c9d1d9">NIT WARANGAL</text>

  <text x="65" y="375" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8b949e">
