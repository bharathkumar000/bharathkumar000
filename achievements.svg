  <rect x="40" y="270" width="545" height="200" rx="8" fill="#0d0d1a" fill-opacity="0.6" stroke="#00F2FF" stroke-opacity="0.12" />

  <text x="65" y="308" font-family="'Segoe UI', sans-serif" font-size="13" fill="#c9d1d9">⭐</text>
  <text x="90" y="308" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00F2FF" filter="url(#glow-ach)">
