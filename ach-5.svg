<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-5" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-5">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-5)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />

  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0 40 H40 L60 60 H120" />
    <path d="M550 160 H510 L490 140 H380" />
  </g>
  <g fill="none">
    <path d="M0 40 H40 L60 60 H120" stroke="#39FF14" stroke-width="2" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="115" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M550 160 H510 L490 140 H380" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="20, 150">
      <animate attributeName="stroke-dashoffset" from="-170" to="0" dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Content -->
  <text x="25" y="54" font-family="sans-serif" font-size="20">🥇</text>
  <text x="65" y="54" font-family="'Courier New', monospace" font-size="23" font-weight="bold" fill="#00F2FF" filter="url(#glow-5)">1st PLACE — Avishkar Conclave</text>
  
  <text x="25" y="92" font-family="monospace" font-size="16" fill="#8b949e">📂</text>
  <text x="55" y="90" font-family="'Courier New', monospace" font-size="16" fill="#00BFFF" text-decoration="underline">nexus-twin</text>
  <text x="175" y="90" font-family="monospace" font-size="16" fill="#c9d1d9" font-weight="bold">· VVCE MYSURU</text>
  
  <text x="25" y="125" font-family="sans-serif" font-size="15" fill="#8b949e">Autonomous 3D spatial twin and urban command center</text>
  <text x="25" y="145" font-family="sans-serif" font-size="15" fill="#8b949e">with neural-synchronized simulation physics.</text>

  <rect x="25" y="165" width="95" height="22" rx="4" fill="#339933" />
  <text x="72" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">NEURAL SYNC</text>
  <rect x="130" y="165" width="80" height="22" rx="4" fill="#007ACC" />
  <text x="170" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">TYPESCRIPT</text>
  <rect x="220" y="165" width="60" height="22" rx="4" fill="#6B21A8" />
  <text x="250" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">3D MAPS</text>
</svg>
