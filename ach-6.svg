<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-6" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-6" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-6">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-6)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />

  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0 40 H40 L60 60 H120" />
    <path d="M550 160 H510 L490 140 H380" />
  </g>
  <g fill="none">
    <path d="M0 40 H40 L60 60 H120" stroke="#00ffff" stroke-width="2" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="115" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M550 160 H510 L490 140 H380" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="20, 150">
      <animate attributeName="stroke-dashoffset" from="-170" to="0" dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Content -->
  <text x="25" y="54" font-family="sans-serif" font-size="20">🥈</text>
  <text x="65" y="54" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#00F2FF" filter="url(#glow-6)">2nd PLACE — Fusion X 1.0</text>
  
  <text x="25" y="92" font-family="monospace" font-size="16" fill="#8b949e">📂</text>
  <text x="55" y="90" font-family="'Courier New', monospace" font-size="16" fill="#00BFFF" text-decoration="underline">connect-and-prep</text>
  <text x="225" y="90" font-family="monospace" font-size="16" fill="#c9d1d9" font-weight="bold">· VVCE MYSURU</text>
  
  <text x="25" y="125" font-family="sans-serif" font-size="15" fill="#8b949e">Academic platform for engineering students featuring</text>
  <text x="25" y="145" font-family="sans-serif" font-size="15" fill="#8b949e">a peer-to-peer tutoring engine and real-time attendance.</text>

  <rect x="25" y="165" width="60" height="22" rx="4" fill="#007ACC" />
  <text x="55" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">REACT</text>
  <rect x="95" y="165" width="75" height="22" rx="4" fill="#3ECF8E" />
  <text x="132" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">SUPABASE</text>
  <rect x="180" y="165" width="65" height="22" rx="4" fill="#1f1f1f" stroke="#333" stroke-width="0.5" />
  <text x="212" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">NEXT.JS</text>
</svg>
