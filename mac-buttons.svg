<svg width="80" height="20" viewBox="0 0 80 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Close Button (Red) -->
  <circle cx="10" cy="10" r="8" fill="#ff5f56" />
  <g stroke="#4d0000" stroke-width="1.2" stroke-linecap="round">
    <line x1="6.5" y1="6.5" x2="13.5" y2="13.5" />
    <line x1="13.5" y1="6.5" x2="6.5" y2="13.5" />
  </g>

  <!-- Minimize Button (Yellow) -->
  <circle cx="36" cy="10" r="8" fill="#ffbd2e" />
  <line x1="32" y1="10" x2="40" y2="10" stroke="#995700" stroke-width="1.5" stroke-linecap="round" />

  <!-- Maximize Button (Green) -->
  <circle cx="62" cy="10" r="8" fill="#27c93f" />
  <g stroke="#006500" stroke-width="1.2" stroke-linecap="round">
    <polyline points="58,7 58,13 64,13" fill="none" />
    <polyline points="66,13 66,7 60,7" fill="none" />
  </g>
</svg>
