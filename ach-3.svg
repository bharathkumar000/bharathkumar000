<svg width="550" height="200" viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#001529" />
      <stop offset="100%" stop-color="#040404" />
    </radialGradient>
    <pattern id="grid-3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F2FF" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <filter id="glow-3">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="550" height="200" fill="url(#bg-3)" rx="8" stroke="#00F2FF" stroke-opacity="0.15" />
  
  <g stroke="#00F2FF" stroke-opacity="0.08" stroke-width="1" fill="none">
    <path d="M0 100 H40 L60 120 H150" />
    <path d="M550 30 H510 L490 50 H400" />
    <path d="M100 0 V20 L80 40" stroke-opacity="0.05" />
  </g>
  <g fill="none">
    <path d="M0 100 H40 L60 120 H150" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="115" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M550 30 H510 L490 50 H400" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="15, 100">
      <animate attributeName="stroke-dashoffset" from="-115" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- New Data Flow -->
    <path d="M100 200 V160 L130 130" stroke="#00ffff" stroke-width="1" stroke-dasharray="10, 80" opacity="0.3">
      <animate attributeName="stroke-dashoffset" from="-90" to="0" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M400 0 V30 L430 60" stroke="#00ffff" stroke-width="1.2" stroke-dasharray="5, 50" opacity="0.4">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1.2s" repeatCount="indefinite" />
    </path>
  </g>

  <text x="25" y="54" font-family="sans-serif" font-size="20">⭐</text>
  <text x="65" y="54" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#00F2FF" filter="url(#glow-3)">Semi-Finalist — Idea Pitching</text>
  
  <text x="25" y="92" font-family="monospace" font-size="16" fill="#8b949e">📂</text>
  <text x="55" y="90" font-family="'Courier New', monospace" font-size="16" fill="#00BFFF" text-decoration="underline">connect-prep</text>
  <text x="175" y="90" font-family="monospace" font-size="16" fill="#c9d1d9" font-weight="bold">· NIT WARANGAL</text>
  
  <text x="25" y="125" font-family="sans-serif" font-size="15" fill="#8b949e">Academic platform for engineering students</text>
  <text x="25" y="145" font-family="sans-serif" font-size="15" fill="#8b949e">featuring a P2P tutoring engine.</text>

  <rect x="25" y="165" width="60" height="22" rx="4" fill="#61DAFB" />
  <text x="55" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#000">REACT</text>
  <rect x="95" y="165" width="65" height="22" rx="4" fill="#000" stroke="#333" />
  <text x="127" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">VERCEL</text>
  <rect x="170" y="165" width="75" height="22" rx="4" fill="#24292E" />
  <text x="207" y="180" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fff">PEERLIST</text>
</svg>
